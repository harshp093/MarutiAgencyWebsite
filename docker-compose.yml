version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: maaruti_postgres
    restart: always
    environment:
      POSTGRES_USER: maaruti_user
      POSTGRES_PASSWORD: maaruti_password
      POSTGRES_DB: maaruti_travels
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: maaruti_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
